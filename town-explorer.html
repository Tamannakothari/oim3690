<!DOCTYPE html>
<html>
<head>
  <title>MA Town Explorer</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }

    input {
      padding: 8px;
      margin-bottom: 10px;
      width: 250px;
    }

    .town {
      border-bottom: 1px solid #ccc;
      padding: 8px 0;
    }
  </style>
</head>
<body>

  <h2>MA Town Explorer</h2>

  <input type="text" id="search" placeholder="Search towns...">
  <p id="count"></p>

  <div id="towns"></div>

  <h3>Largest Population</h3>
  <p id="largest"></p>

  <script>
    const townsContainer = document.querySelector('#towns');
    const searchInput = document.querySelector('#search');
    const countDisplay = document.querySelector('#count');
    const largestDisplay = document.querySelector('#largest');

    let allTowns = [];

    async function fetchTowns() {
      try {
        const response = await fetch('https://oim.108122.xyz/mass');
        const data = await response.json();

        allTowns = data;

        displayTowns(allTowns.slice(0, 10)); // first 10
        showLargestTown(allTowns);

      } catch (error) {
        townsContainer.textContent = 'Error loading towns 😢';
        console.error(error);
      }
    }

    function displayTowns(towns) {
      townsContainer.innerHTML = '';

      towns.forEach(town => {
        const div = document.createElement('div');
        div.classList.add('town');

        div.innerHTML = `
          <strong>${town.name}</strong><br>
          County: ${town.county}<br>
          Population: ${town.population}
        `;

        townsContainer.appendChild(div);
      });

      countDisplay.textContent = `Showing ${towns.length} towns`;
    }

    function showLargestTown(towns) {
      let largest = towns[0];

      for (let i = 1; i < towns.length; i++) {
        if (towns[i].population > largest.population) {
          largest = towns[i];
        }
      }

      largestDisplay.textContent = `${largest.name} (${largest.population})`;
    }

    searchInput.addEventListener('input', function() {
      const query = searchInput.value.toLowerCase();

      const filtered = allTowns.filter(town =>
        town.name.toLowerCase().includes(query)
      );

      displayTowns(filtered);
    });

    fetchTowns();
  </script>

</body>
</html>
