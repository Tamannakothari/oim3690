<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Tamanna Kothari</title>

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #f5f5f5;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.contact-container {
    background: white;
    padding: 30px;
    border-radius: 8px;
    width: 420px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

h2 {
    text-align: center;
}

.contact-info {
    margin-bottom: 20px;
    font-size: 14px;
}

.contact-info a {
    color: #0073b1;
    text-decoration: none;
}

.contact-info a:hover {
    text-decoration: underline;
}

form {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.form-group {
    display: flex;
    flex-direction: column;
}

label {
    margin-bottom: 5px;
    font-weight: bold;
}

input, textarea {
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 4px;
}

textarea {
    resize: vertical;
    min-height: 100px;
}

button {
    padding: 12px;
    border: none;
    background-color: #4CAF50;
    color: white;
    font-size: 16px;
    border-radius: 4px;
    cursor: pointer;
}

button:hover {
    background-color: #45a049;
}
</style>

</head>

<body>

<div class="contact-container">

<h2>Contact Tamanna Kothari</h2>

<div class="contact-info">
<p>Email: <a href="mailto:tkothari1@babson.edu">tkothari1@babson.edu</a></p>
<p>LinkedIn: <a href="https://www.linkedin.com/in/tamanna-kothari/" target="_blank">
linkedin.com/in/tamanna-kothari
</a></p>
</div>

<form>

<div class="form-group">
<label for="name">Name</label>
<input type="text" id="name" name="name" placeholder="Enter your name" required>
</div>

<div class="form-group">
<label for="email">Email</label>
<input type="email" id="email" name="email" placeholder="Enter your email" required>
</div>

<div class="form-group">
<label for="message">Message</label>
<textarea id="message" name="message" placeholder="Write your message here"></textarea>
</div>

<button type="submit">Send Message</button>

</form>

</div>

</body>
</html>
